name: phimhay_app
description: "Xiao Phim - Xem phim online"
publish_to: 'none'
version: 3.3.5+14

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  provider: ^6.1.2
  cached_network_image: ^3.4.0
  carousel_slider: ^5.0.0
  flutter_cache_manager: ^3.4.1
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_inappwebview: ^6.1.5
  toastification: ^2.3.0
  media_kit: ^1.1.10
  media_kit_video: 1.2.5
  media_kit_native_event_loop: ^1.0.9
  media_kit_libs_android_video: ^1.3.2
  media_kit_libs_ios_video: ^1.1.4
  dio_cookie_manager: ^3.4.0
  cookie_jar: ^4.0.9
  url_launcher: ^6.2.5
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.6
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  flutter_webrtc: ^0.12.1
  permission_handler: ^11.3.1
  package_info_plus: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0D0F14"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
